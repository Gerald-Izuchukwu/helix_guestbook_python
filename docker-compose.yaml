services:
  web:
    build: .
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - guestbook_network
    restart: unless-stopped
  redis:
    image: "redis:alpine"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - guestbook_network
    restart: unless-stopped

volumes:
  redis_data:

networks:
  guestbook_network:
    driver: bridge

